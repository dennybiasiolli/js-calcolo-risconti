<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolo Ratei o Risconti suddivisi per anno gratis online</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>Calcolo Ratei o Risconti suddivisi per anno</h1>
            <p class="subtitle">Suddividi un importo per competenza annuale in base ai giorni di ciascun periodo</p>
        </div>
    </header>

    <main class="container">
        <section class="card form-card">
            <form id="form-calcolo" novalidate>
                <div class="form-grid">
                    <div class="field">
                        <label for="data-inizio">Data inizio</label>
                        <input type="date" id="data-inizio" name="dataInizio" required>
                    </div>
                    <div class="field">
                        <label for="data-fine">Data fine</label>
                        <input type="date" id="data-fine" name="dataFine" required>
                    </div>
                    <div class="field">
                        <label for="importo">Importo (€)</label>
                        <input type="number" id="importo" name="importo" step="0.01" min="0" placeholder="0,00" inputmode="decimal">
                    </div>
                    <div class="field field-action">
                        <button type="submit" class="btn btn-primary" id="btn-calcola">Calcola</button>
                    </div>
                </div>

                <label class="checkbox-field">
                    <input type="checkbox" id="includi-data-inizio" checked>
                    <span>Considera giorno iniziale come competenza</span>
                </label>
            </form>

            <div id="summary" class="summary" hidden>
                <div class="summary-item" id="summary-giorni"></div>
                <div class="summary-item" id="summary-totale"></div>
                <div class="summary-warning" id="summary-residuo" hidden></div>
            </div>
        </section>

        <section id="results" class="results" aria-live="polite"></section>

        <section id="empty-state" class="empty-state card">
            <p>Inserisci le date e l'importo, poi premi <strong>Calcola</strong> per vedere la suddivisione per anno.</p>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <a href="https://github.com/dennybiasiolli/js-calcolo-risconti" target="_blank" rel="noopener noreferrer">
                View source on GitHub
            </a>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
